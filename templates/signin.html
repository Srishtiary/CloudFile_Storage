<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In – Cloud Drive</title>
  <meta name="description" content="Sign in to your Cloud Drive account to access and manage your files.">
  <meta property="og:title" content="Sign In – Cloud Drive">
  <meta property="og:description" content="Securely access your Cloud Drive account to manage your files.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://yourdomain.com/signin.html">
  <meta property="og:image" content="https://yourdomain.com/images/og-signin.jpg">
  <link rel="icon" href="favicon.ico">
  <style>
    body {
      font-family: 'Google Sans', sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      /* Fade in background */
      animation: fadeIn 1s ease forwards;
    }
    /* Fade in body background */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    /* Slide up + fade in login box */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .login-box {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
      opacity: 0;
      animation: fadeInUp 0.8s ease forwards;
      animation-delay: 0.3s;
    }
    .login-box h2 {
      margin-bottom: 20px;
      color: #1a73e8;
      text-align: center;
    }
    .input-group {
      margin-bottom: 20px;
    }
    .input-group label {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
      color: #333;
    }
    .input-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid #dadce0;
      border-radius: 6px;
      font-size: 14px;
    }
    .login-btn {
      width: 100%;
      padding: 12px;
      background: #1a73e8;
      border: none;
      color: white;
      font-weight: bold;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s, background 0.3s;
    }
    .login-btn:hover {
      background: #1765cc;
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .back-link {
      margin-top: 15px;
      text-align: center;
    }
    .back-link a {
      color: #1a73e8;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="login-box">
    <h2>Sign In to Cloud Drive</h2>
    <form action="/dashboard" method="POST">
      <div class="input-group">
        <label for="email">Email or Phone</label>
        <input type="text" id="email" name="email" placeholder="you@example.com" required />
      </div>
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required />
      </div>
      <button type="submit" class="login-btn">Login</button>
    </form>
    <div class="back-link">
      <a href="index.html">← Back to Homepage</a>
    </div>
  </main>
</body>
</html>
